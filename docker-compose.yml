services:
  postgres-user:
    image: postgres:16-alpine
    container_name: taskforge-postgres-user
    environment:
      POSTGRES_DB: taskforge_user
      POSTGRES_USER: taskforge
      POSTGRES_PASSWORD: taskforge
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskforge -d taskforge_user"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - private

  postgres-task:
    image: postgres:16-alpine
    container_name: taskforge-postgres-task
    environment:
      POSTGRES_DB: taskforge_task
      POSTGRES_USER: taskforge
      POSTGRES_PASSWORD: taskforge
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskforge -d taskforge_task"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - private

  user-service:
    build:
      context: ./backend/user-service
    container_name: taskforge-user-service
    environment:
      DB_USER_URL: jdbc:postgresql://postgres-user:5432/taskforge_user
      DB_USER_USERNAME: taskforge
      DB_USER_PASSWORD: taskforge
      PRIVATE_KEY: /run/keys/private.pem
      PUBLIC_KEY: /run/keys/public.pem
      COOKIE_SECURE: "false"
    volumes:
      - ./infra/keys:/run/keys:ro
    depends_on:
      postgres-user:
        condition: service_healthy
    networks:
      - private

  task-service:
    build:
      context: ./backend/task-service
    container_name: taskforge-task-service
    environment:
      DB_EVENT_URL: jdbc:postgresql://postgres-task:5432/taskforge_task
      DB_EVENT_USERNAME: taskforge
      DB_EVENT_PASSWORD: taskforge
      TASK_PUBLIC_KEY: /run/keys/public.pem
    volumes:
      - ./infra/keys:/run/keys:ro
    depends_on:
      postgres-task:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - private

  frontend:
    build:
      context: ./frontend/web
    container_name: taskforge-frontend
    volumes:
      - ./frontend/web:/app
      - /app/node_modules
    expose:
      - "4200"
    networks:
      - private

  api-1:
    image: nginx:1.27-alpine
    container_name: taskforge-api-1
    volumes:
      - ./infra/nginx/api-gateway.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      user-service:
        condition: service_started
      task-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - public
      - private

  api-2:
    image: nginx:1.27-alpine
    container_name: taskforge-api-2
    volumes:
      - ./infra/nginx/api-gateway.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      user-service:
        condition: service_started
      task-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - public
      - private

  load-balancer:
    image: nginx:1.27-alpine
    container_name: taskforge-load-balancer
    ports:
      - "8088:80"
    volumes:
      - ./infra/nginx/load-balancer.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
    networks:
      - public

networks:
  public:
  private:
